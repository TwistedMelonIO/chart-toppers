services:
  chart-toppers:
    build: .
    container_name: chart-toppers
    ports:
      # Web dashboard
      - "3200:3000"
      # OSC input - receives from Bitfocus Companion
      - "53536:53536/udp"
      - "53536:53536/tcp"
    environment:
      - WEB_PORT=3000
      - OSC_LISTEN_PORT=53536
      - MAX_TIME=100
      - POINTS_PER_CORRECT=5
      - QLAB_CUE_ANTHEMS=ANTHEMS
      - QLAB_CUE_ICONS=ICONS
      - QLAB_CUE_R4NEXT=R4NEXT
      - QLAB_CUE_R4_ANTHEMS=R4ANTHEM
      - QLAB_CUE_R4_ICONS=R4ICON
      - QLAB_CUE_R4_END=R5
      - QLAB_CUE_R1_TEAM_SD=R1TEAMSD
      - QLAB_CUE_SDE_ANTHEMS=SDE11
      - QLAB_CUE_SDE_ICONS=SDE10
      - QLAB_CUE_R2GO2=R2GO2
      - QLAB_CUE_R2_TEAM2=R2T
      - QLAB_CUE_R3=AWO
      - QLAB_CUE_LEADER_SD=LEADERSD
      # Bridge URL for OSC output
      - BRIDGE_URL=http://osc-bridge:3201
      # Base folder where QLab audio files live (mapped below)
      - TRACK_BASE_PATH=/app/qlab-audio
      # App version
      - APP_VERSION=4.1.0
      # License key (empty by default, set during installation)
      - LICENSE_KEY=${LICENSE_KEY:-}
      - HOST_HARDWARE_ID=${HOST_HARDWARE_ID:-}
    volumes:
      # Persistent storage for activity log and pack settings
      - chart-toppers-data:/app/data
      # Host QLab audio folder → inside container (set in .env by install_license.sh)
      - ${QLAB_AUDIO_PATH:-/path/to/qlab-audio}:/app/qlab-audio:ro
    depends_on:
      - osc-bridge
    restart: unless-stopped

  osc-bridge:
    build: ./bridge
    container_name: osc-bridge
    environment:
      - BRIDGE_PORT=3201
      - QLAB_HOST=host.docker.internal
      - QLAB_PORT=53000
      # Callback URL for QLab playback data (bidirectional bridge)
      - CALLBACK_URL=http://chart-toppers:3000
      - POLL_INTERVAL_MS=200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  chart-toppers-data:
